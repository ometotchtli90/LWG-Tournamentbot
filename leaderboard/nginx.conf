server {
    # /Admin — dashboard UI (password protected)
    location /Admin {
        auth_basic           "LWG Tournament Bot";
        auth_basic_user_file /usr/share/nginx/html/leaderboard/.htpasswd;

        proxy_pass          ${BOT_UPSTREAM};
        proxy_http_version  1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # /api/ — bot API calls (same auth)
    location /api/ {
        auth_basic           "LWG Tournament Bot";
        auth_basic_user_file /usr/share/nginx/html/leaderboard/.htpasswd;

        proxy_pass          ${BOT_UPSTREAM};
        proxy_http_version  1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
    }

    # WebSocket — live dashboard updates (same auth)
    location /ws {
        auth_basic           "LWG Tournament Bot";
        auth_basic_user_file /usr/share/nginx/html/leaderboard/.htpasswd;

        proxy_pass          ${BOT_UPSTREAM};
        proxy_http_version  1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # data.json — no cache
    location = /data.json {
        root /usr/share/nginx/html/leaderboard;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Leaderboard static site
    location / {
        root /usr/share/nginx/html/leaderboard;
        index index.html index.htm;
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html { root /usr/share/nginx/html/leaderboard; internal; }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html/leaderboard; internal; }
}
