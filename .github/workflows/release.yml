name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bot dependencies
        working-directory: bot
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: bot
        run: npx playwright install chromium

      - name: Build Windows installer
        working-directory: bot
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LWG Tournament Bot ${{ github.ref_name }}"
          body: |
            ## LWG Tournament Bot ${{ github.ref_name }}

            ### Installation
            1. Download the `.exe` installer below
            2. Run it — click "More info" → "Run anyway" if Windows warns you
            3. App installs and opens automatically

            ### First run
            - Go to ⚙ Settings → enter controller + worker credentials
            - Click 🚀 Launch Browsers
          files: |
            bot/dist/*.exe
            bot/dist/*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
